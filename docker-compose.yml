version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: defi_rates
      POSTGRES_USER: aggregator
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./src/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aggregator"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  engine:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://aggregator:${DB_PASSWORD:-devpassword}@postgres:5432/defi_rates
      REDIS_URL: redis://redis:6379
      ETHEREUM_RPC_URL: ${ETHEREUM_RPC_URL}
      ARBITRUM_RPC_URL: ${ARBITRUM_RPC_URL}
      POLYGON_RPC_URL: ${POLYGON_RPC_URL}
      BASE_RPC_URL: ${BASE_RPC_URL}
      AVALANCHE_RPC_URL: ${AVALANCHE_RPC_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scanner:
    build:
      context: .
      dockerfile: Dockerfile.scanner
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://aggregator:${DB_PASSWORD:-devpassword}@postgres:5432/defi_rates
      REDIS_URL: redis://redis:6379
      ETHEREUM_RPC_URL: ${ETHEREUM_RPC_URL}
      ARBITRUM_RPC_URL: ${ARBITRUM_RPC_URL}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./src/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://engine:8000
    depends_on:
      - engine

volumes:
  postgres_data:
